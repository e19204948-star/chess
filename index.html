<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chess Firebase Live</title>
    
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    
    <style>
        body { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #2c3e50;
            color: white;
            padding-top: 20px;
        }
        #board { 
            width: 400px; 
            max-width: 90vw;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }
        .status-container { 
            margin: 20px; 
            padding: 10px 20px;
            background: #34495e;
            border-radius: 8px;
            font-size: 1.2em;
            text-align: center;
        }
        h2 { margin-bottom: 10px; }
    </style>
</head>
<body>

    <h2>♟️ Échecs Multi-joueurs</h2>
    
    <div id="board"></div>
    
    <div class="status-container">
        <span id="status">Initialisation...</span>
    </div>

    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // --- CONFIGURATION FIREBASE ---
        // Remplacez les valeurs "VOTRE_..." par celles de votre console Firebase
        const firebaseConfig = {
            apiKey: "426864123902", 
            authDomain: "chess-7eca6.firebaseapp.com",
            databaseURL: "https://chess-7eca6-default-rtdb.europe-west1.firebasedatabase.app/",
            projectId: "chess-7eca6",
            storageBucket: "chess-7eca6.appspot.com",
            messagingSenderId: "426864123902",
            appId: "chess-7eca6" 
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const gameRef = ref(db, 'games/live-game');

        // --- LOGIQUE ÉCHECS ---
        let board = null;
        let game = new Chess();
        let $status = $('#status');

        function onDragStart (source, piece, position, orientation) {
            if (game.game_over()) return false;
            if ((game.turn() === 'w' && piece.search(/^b/) !== -1) ||
                (game.turn() === 'b' && piece.search(/^w/) !== -1)) {
                return false;
            }
        }

        function onDrop(source, target) {
            let move = game.move({
                from: source,
                to: target,
                promotion: 'q' 
            });

            if (move === null) return 'snapback';

            // Envoi à Firebase
            set(gameRef, {
                fen: game.fen(),
                timestamp: Date.now()
            });
        }

        function updateStatus() {
            let status = '';
            let moveColor = (game.turn() === 'b') ? 'Noirs' : 'Blancs';

            if (game.in_checkmate()) {
                status = `Échec et mat ! Les ${moveColor} ont perdu.`;
            } else if (game.in_draw()) {
                status = 'Match nul !';
            } else {
                status = `Tour aux : ${moveColor}`;
                if (game.in_check()) status += ' (ÉCHEC)';
            }
            $status.html(status);
        }

        // --- INITIALISATION ÉCHIQUIER ---
        const config = {
            draggable: true,
            position: 'start',
            onDragStart: onDragStart,
            onDrop: onDrop,
            onSnapEnd: function() {
                board.position(game.fen());
            }
        };
        board = Chessboard('board', config);

        // --- SYNCHRONISATION TEMPS RÉEL ---
        onValue(gameRef, (snapshot) => {
            const data = snapshot.val();
            if (data && data.fen) {
                if (game.fen() !== data.fen) {
                    game.load(data.fen);
                    board.position(data.fen);
                }
                updateStatus();
            } else {
                set(gameRef, { fen: game.fen() });
            }
        });

    </script>
</body>
</html>
