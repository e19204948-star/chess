<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="chat·io">
<meta name="theme-color" content="#0e0e12" media="(prefers-color-scheme: dark)">
<meta name="theme-color" content="#f0f0f8" media="(prefers-color-scheme: light)">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>chat·io</title>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getDatabase, ref, set, push, onValue, onChildAdded, remove, onDisconnect, query, orderByChild, update, get, off } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
  import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

  // --- CONFIGURATION FIREBASE ---
  // Remplacer par vos propres clés si nécessaire
  const firebaseConfig = {
    apiKey: "VOTRE_API_KEY",
    authDomain: "VOTRE_PROJECT.firebaseapp.com",
    databaseURL: "https://VOTRE_PROJECT-default-rtdb.firebaseio.com",
    projectId: "VOTRE_PROJECT",
    storageBucket: "VOTRE_PROJECT.appspot.com",
    messagingSenderId: "VOTRE_SENDER_ID",
    appId: "VOTRE_APP_ID"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  const auth = getAuth(app);

  // --- VARIABLES D'ÉTAT ---
  let currentUser = null;
  let currentConvId = null;
  let allUsers = {};
  let conversations = {};
  
  // --- VARIABLES WEBRTC ---
  let localStream = null;
  let peerConnections = {};
  let currentCallUser = null;
  let callState = 'idle'; // idle, calling, incoming, connected
  const ICE_SERVERS = { iceServers: [{ urls: "stun:stun.l.google.com:19302" }] };

  // --- FONCTIONS UI POUR LES APPELS ---
  function showCallUI(status, name = "Appel") {
    const overlay = document.getElementById('call-overlay');
    if (!overlay) return;
    overlay.classList.add('visible');
    overlay.querySelector('.call-status').innerText = status;
    overlay.querySelector('.call-name').innerText = name;
    
    const acceptBtn = overlay.querySelector('.call-accept-btn');
    if (callState === 'incoming') {
      acceptBtn.style.display = 'flex';
    } else {
      acceptBtn.style.display = 'none';
    }
  }

  function hideCallUI() {
    const overlay = document.getElementById('call-overlay');
    if (overlay) overlay.classList.remove('visible');
  }

  function showIncomingCallUI(fromId) {
    const name = allUsers[fromId] ? allUsers[fromId].name : fromId;
    showCallUI("Appel entrant...", name);
    const acceptBtn = document.querySelector('.call-accept-btn');
    if (acceptBtn) acceptBtn.style.display = 'flex';
  }

  function getOtherUserId() {
    if (!currentConvId) return null;
    const ids = currentConvId.split('_');
    // On cherche l'ID qui n'est pas le nôtre (si c'est un chat direct)
    const other = ids.find(id => id !== currentUser.id);
    return other || null;
  }

  // --- LOGIQUE WEBRTC ---

  window.initiateCall = async function() {
    const otherUserId = getOtherUserId();
    if (!otherUserId) {
        showToast("Sélectionnez une conversation directe pour appeler");
        return;
    }

    currentCallUser = otherUserId;
    callState = 'calling';
    showCallUI("Appel en cours...", allUsers[otherUserId]?.name || otherUserId);

    try {
      localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
      const pc = new RTCPeerConnection(ICE_SERVERS);
      peerConnections[otherUserId] = pc;

      localStream.getTracks().forEach(track => pc.addTrack(track, localStream));

      pc.onicecandidate = e => {
        if (e.candidate) {
          push(ref(db, `calls/${otherUserId}/candidates`), e.candidate.toJSON());
        }
      };

      const offer = await pc.createOffer();
      await pc.setLocalDescription(offer);
      
      await set(ref(db, `calls/${otherUserId}/offer`), { 
        from: currentUser.id, 
        offer: { type: offer.type, sdp: offer.sdp } 
      });

      listenForAnswer();
      listenForCandidates();
    } catch (err) {
      console.error("Erreur micro:", err);
      showToast("Impossible d'accéder au micro");
      endCall();
    }
  };

  window.acceptCall = async function() {
    try {
      localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
      const pc = new RTCPeerConnection(ICE_SERVERS);
      peerConnections[currentCallUser] = pc;

      localStream.getTracks().forEach(track => pc.addTrack(track, localStream));

      pc.onicecandidate = e => {
        if (e.candidate) {
          push(ref(db, `calls/${currentUser.id}/candidates`), e.candidate.toJSON());
        }
      };

      await pc.setRemoteDescription(new RTCSessionDescription(window.pendingOffer));
      const answer = await pc.createAnswer();
      await pc.setLocalDescription(answer);
      
      await set(ref(db, `calls/${currentCallUser}/answer`), { 
        answer: { type: answer.type, sdp: answer.sdp } 
      });

      callState = 'connected';
      showCallUI("Connecté", allUsers[currentCallUser]?.name || currentCallUser);
      listenForCandidates();
    } catch (err) {
      console.error("Erreur acceptation:", err);
      endCall();
    }
  };

  function listenForCalls() {
    const callRef = ref(db, `calls/${currentUser.id}/offer`);
    onValue(callRef, async snap => {
      const data = snap.val();
      if (!data) return;
      
      currentCallUser = data.from;
      window.pendingOffer = data.offer;
      callState = 'incoming';
      showIncomingCallUI(data.from);
    });
  }

  function listenForAnswer() {
    const answerRef = ref(db, `calls/${currentUser.id}/answer`);
    onValue(answerRef, async snap => {
      const data = snap.val();
      if (!data || !peerConnections[currentCallUser]) return;
      
      const pc = peerConnections[currentCallUser];
      await pc.setRemoteDescription(new RTCSessionDescription(data.answer));
      callState = 'connected';
      showCallUI("Connecté", allUsers[currentCallUser]?.name || currentCallUser);
    });
  }

  function listenForCandidates() {
    const candidatesRef = ref(db, `calls/${currentUser.id}/candidates`);
    onChildAdded(candidatesRef, snap => {
      const pc = peerConnections[currentCallUser];
      if (pc && snap.val()) {
        pc.addIceCandidate(new RTCIceCandidate(snap.val()));
      }
    });
  }

  window.endCall = function() {
    if (localStream) {
      localStream.getTracks().forEach(track => track.stop());
      localStream = null;
    }
    const pc = peerConnections[currentCallUser];
    if (pc) {
        pc.close();
        delete peerConnections[currentCallUser];
    }
    
    callState = 'idle';
    
    if (currentUser) {
        set(ref(db, `calls/${currentUser.id}`), null);
    }
    
    currentCallUser = null;
    hideCallUI();
  };

  // --- INITIALISATION AUTHENTIFICATION ---
  onAuthStateChanged(auth, user => {
    if (user) {
        // Logique de démarrage de l'application
        currentUser = { id: user.uid, name: user.displayName || "Moi" };
        listenForCalls();
        // ... (Appel à vos autres fonctions de démarrage : loadUsers, loadConvs, etc.)
    } else {
        // Redirection vers l'écran de login
    }
  });

  // Liaison des boutons aux fonctions globales
  document.addEventListener('DOMContentLoaded', () => {
      const acceptBtn = document.querySelector('.call-accept-btn');
      const rejectBtn = document.querySelector('.call-reject-btn');
      if (acceptBtn) acceptBtn.onclick = window.acceptCall;
      if (rejectBtn) rejectBtn.onclick = window.endCall;
  });

  // [Conservez le reste de votre code : PWA, Thèmes, Chat, Audio, etc.]
</script>
</body>
</html>
