<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jeu d'échecs basique</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #2c3e50;
            margin: 0;
            font-family: Arial, sans-serif;
        }

        #chessboard {
            display: grid;
            grid-template-columns: repeat(8, 70px);
            grid-template-rows: repeat(8, 70px);
            border: 4px solid #1a252f;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }

        .square {
            width: 70px;
            height: 70px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 45px;
            cursor: pointer;
            user-select: none;
        }

        /* Couleurs des cases */
        .light { background-color: #f0d9b5; }
        .dark { background-color: #b58863; }

        /* Case sélectionnée */
        .selected { background-color: #baca44 !important; }
    </style>
</head>
<body>

    <div id="chessboard"></div>

    <script>
        const boardElement = document.getElementById('chessboard');
        let selectedSquare = null;

        // Représentation initiale de l'échiquier (Symboles Unicode)
        const initialBoard = [
            ['♜', '♞', '♝', '♛', '♚', '♝', '♞', '♜'],
            ['♟', '♟', '♟', '♟', '♟', '♟', '♟', '♟'],
            ['', '', '', '', '', '', '', ''],
            ['', '', '', '', '', '', '', ''],
            ['', '', '', '', '', '', '', ''],
            ['', '', '', '', '', '', '', ''],
            ['♙', '♙', '♙', '♙', '♙', '♙', '♙', '♙'],
            ['♖', '♘', '♗', '♕', '♔', '♗', '♘', '♖']
        ];

        // Fonction pour dessiner l'échiquier
        function createBoard() {
            boardElement.innerHTML = '';
            for (let row = 0; row < 8; row++) {
                for (let col = 0; col < 8; col++) {
                    const square = document.createElement('div');
                    square.classList.add('square');
                    
                    // Alternance des couleurs
                    if ((row + col) % 2 === 0) {
                        square.classList.add('light');
                    } else {
                        square.classList.add('dark');
                    }

                    // Ajout de la pièce s'il y en a une
                    square.textContent = initialBoard[row][col];
                    square.dataset.row = row;
                    square.dataset.col = col;

                    // Gestionnaire de clic
                    square.addEventListener('click', handleSquareClick);
                    boardElement.appendChild(square);
                }
            }
        }

        // Logique de déplacement
        function handleSquareClick(event) {
            const clickedSquare = event.currentTarget;

            // Si on a déjà sélectionné une case
            if (selectedSquare) {
                // Déplacer la pièce (seulement s'il y a eu un clic sur une case différente)
                if (selectedSquare !== clickedSquare) {
                    clickedSquare.textContent = selectedSquare.textContent;
                    selectedSquare.textContent = '';
                }
                
                // Retirer la surbrillance
                selectedSquare.classList.remove('selected');
                selectedSquare = null;
            } 
            // Si on n'a rien sélectionné et qu'on clique sur une pièce
            else if (clickedSquare.textContent !== '') {
                selectedSquare = clickedSquare;
                selectedSquare.classList.add('selected');
            }
        }

        // Initialisation
        createBoard();
    </script>

</body>
</html>
